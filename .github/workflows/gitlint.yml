name: Gitlint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gitlint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install gitlint
        run: python -m pip install gitlint

      - name: Run gitlint for push commits
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            gitlint --commits "$HEAD_SHA~1..$HEAD_SHA"
          else
            gitlint --commits "$BEFORE_SHA..$HEAD_SHA"
          fi

      - name: Run gitlint for pull request commits
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: gitlint --commits "$BASE_SHA..$HEAD_SHA"
